<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found – PrimeCare Clinic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --primary: #0077b6;
            --secondary: #00b4d8;
            --text-main: #0f172a;
            --text-sub: #64748b;
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: #f8fafc;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; color: var(--text-main);
            overflow: hidden;
        }
        .bg-gradient {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(0, 119, 182, 0.05), transparent),
                        radial-gradient(circle at 80% 80%, rgba(0, 180, 216, 0.05), transparent);
            z-index: -1;
        }
        .error-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 3rem; border-radius: 32px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center; max-width: 480px; width: 90%;
            animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .icon-container {
            width: 80px; height: 80px;
            background: rgba(0, 119, 182, 0.1);
            color: var(--primary);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 119, 182, 0.2); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(0, 119, 182, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 119, 182, 0); }
        }
        h1 { font-size: 5rem; margin: 0; font-weight: 800; color: var(--primary); letter-spacing: -0.05em; }
        h2 { font-size: 1.5rem; margin: 0.5rem 0 1rem; font-weight: 700; color: var(--text-main); }
        p { color: var(--text-sub); line-height: 1.6; margin-bottom: 2rem; font-size: 1rem; }
        .btn-group { display: flex; flex-direction: column; gap: 0.8rem; }
        .btn {
            padding: 1rem 2rem; border-radius: 16px;
            font-weight: 700; font-size: 0.95rem;
            text-decoration: none; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-primary {
            background: var(--primary); color: white;
            box-shadow: 0 10px 25px rgba(0, 119, 182, 0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 35px rgba(0, 119, 182, 0.4); }
        .btn-ghost {
            color: var(--primary); background: transparent;
            border: 1px solid rgba(0, 119, 182, 0.2);
        }
        .btn-ghost:hover { background: rgba(0, 119, 182, 0.05); }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="error-card">
        <div class="icon-container">
            <i data-lucide="map" style="width: 40px; height: 40px;"></i>
        </div>
        <h1>404</h1>
        <h2>Lost in the Clinic?</h2>
        <p>The page you are looking for doesn't exist or has been moved. Let's get you back to the right department.</p>
        <div class="btn-group">
            <a href="/" class="btn btn-primary">
                <i data-lucide="home" style="width: 18px; height: 18px;"></i> Return Home
            </a>
            <a href="https://wa.me/918592031725" target="_blank" class="btn btn-ghost">
                <i data-lucide="help-circle" style="width: 18px; height: 18px;"></i> Contact Support
            </a>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
