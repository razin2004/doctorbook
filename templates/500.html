<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error – PrimeCare Clinic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --primary: #e11d48;
            --primary-bg: #fff1f2;
            --text-main: #0f172a;
            --text-sub: #64748b;
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: #fffcfc;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; color: var(--text-main);
            overflow: hidden;
        }
        .bg-gradient {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 10% 10%, rgba(225, 29, 72, 0.03), transparent),
                        radial-gradient(circle at 90% 90%, rgba(225, 29, 72, 0.03), transparent);
            z-index: -1;
        }
        .error-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            padding: 3rem; border-radius: 32px;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.06), 0 10px 40px rgba(225, 29, 72, 0.02);
            border: 1px solid rgba(225, 29, 72, 0.05);
            text-align: center; max-width: 480px; width: 90%;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .icon-container {
            width: 80px; height: 80px;
            background: var(--primary-bg);
            color: var(--primary);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
        }
        h1 { font-size: 4rem; margin: 0; font-weight: 800; color: var(--primary); letter-spacing: -0.05em; }
        h2 { font-size: 1.5rem; margin: 0.5rem 0 1rem; font-weight: 700; color: var(--text-main); }
        p { color: var(--text-sub); line-height: 1.6; margin-bottom: 2.2rem; font-size: 0.95rem; }
        .btn-group { display: flex; flex-direction: column; gap: 0.8rem; }
        .btn {
            padding: 1rem 2rem; border-radius: 16px;
            font-weight: 700; font-size: 0.95rem;
            text-decoration: none; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-primary {
            background: #0f172a; color: white;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.2);
        }
        .btn-primary:hover { transform: translateY(-2px); background: #1e293b; }
        .btn-ghost {
            color: var(--text-sub); background: transparent;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .btn-ghost:hover { background: rgba(0, 0, 0, 0.02); color: var(--text-main); }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="error-card">
        <div class="icon-container">
            <i data-lucide="server-off" style="width: 40px; height: 40px;"></i>
        </div>
        <h1>500</h1>
        <h2>System Check Required</h2>
        <p>Something went wrong on our end. Don't worry, your data is safe. Please try refreshing the page or try again in a moment.</p>
        <div class="btn-group">
            <a href="javascript:location.reload()" class="btn btn-primary">
                <i data-lucide="refresh-cw" style="width: 18px; height: 18px;"></i> Refresh Page
            </a>
            <a href="/" class="btn btn-ghost">Return to Homepage</a>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
