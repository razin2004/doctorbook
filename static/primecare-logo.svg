<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="46" stroke="#0077b6" stroke-width="3.2"/>
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="38.5" stroke="#0077b6" stroke-width="2"/>

  <!-- Medical cross (plus) shape - outline style matching original -->
